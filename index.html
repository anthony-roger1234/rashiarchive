<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RASHI ARCHIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <h1 class="logo">
        <span class="white">RASHI</span>
        <span class="yellow">ARCHIVE</span>
    </h1>

    <div class="preview-container">
        <img id="randomPreview" src="" alt="Preview" draggable="false">
    </div>

    <!-- LAYOUT SWITCHER -->
    <div class="layout-switcher">
        <button id="compactBtn" class="layout-btn active">
            5 Columns / 50 Per Page
        </button>
        <button id="extendedBtn" class="layout-btn">
            10 Columns / 200 Per Page
        </button>
    </div>

</header>

<div class="pagination" id="pagination-top"></div>

<section class="gallery">
    <div class="grid" id="imageGrid"></div>
</section>

<div class="pagination" id="pagination-bottom"></div>

<!-- MODAL -->
<div class="preview-modal" id="previewModal">
    <span class="close-modal" id="closeModal">&times;</span>
    <div class="nav left" id="prevBtn">&#10094;</div>
    <img class="modal-image" id="modalImage" draggable="false">
    <div class="nav right" id="nextBtn">&#10095;</div>
    <div class="image-counter" id="imageCounter"></div>
</div>

<script src="assets/data/images.js"></script>
<script src="js/main.js"></script>

</body>
</html>
